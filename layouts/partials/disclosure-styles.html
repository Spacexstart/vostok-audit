{{- /* Стили карточек "material-card" + грид доп. ссылок.
       Используются на страницах disclosure/* и /history/. */ -}}
<style>.disclosure-page,.disclosure-list-page{padding:60px 0;background-color:var(--bg-color)}.material-card{background:var(--card-bg);border-radius:8px;box-shadow:var(--card-shadow);overflow:hidden;padding:40px;margin-bottom:40px}.card-content{color:var(--text-color)}.card-content h1,.card-content h2,.card-content h3,.card-content h4,.card-content h5,.card-content h6{color:var(--primary-color);margin-top:1.5em;margin-bottom:.75em;font-weight:500}.card-content h1{font-size:2em;margin-top:0;color:var(--primary-color);font-weight:600}.card-content h2{font-size:1.5em;color:var(--secondary-color);padding-bottom:10px;border-bottom:1px solid var(--border-color)}.card-content h3{font-size:1.25em}.card-content p{margin-bottom:1em;line-height:1.6}.card-content ul,.card-content ol{margin-left:2em;margin-bottom:1.5em}.card-content li{margin-bottom:.5em;line-height:1.6}.card-content strong{font-weight:500;color:var(--text-color-dark)}.about-links-section{margin-top:60px}.about-links-section h2{color:var(--text-color);margin-bottom:30px;font-size:28px;font-weight:600;text-align:center}.material-links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:30px}.material-link-card{background:var(--card-bg);border-radius:8px;box-shadow:var(--card-shadow);overflow:hidden;transition:box-shadow .3s,transform .3s;display:flex;flex-direction:column}.material-link-card:hover{box-shadow:var(--card-hover-shadow);transform:translateY(-5px)}.card-icon{background-color:var(--secondary-color);color:var(--white);display:flex;justify-content:center;align-items:center;height:120px}.card-icon i{font-size:48px}.card-content{padding:24px}.material-link-card .card-content h3{color:var(--text-color);margin:0 0 12px;font-size:20px;font-weight:500}.material-link-card .card-content p{color:var(--text-color);margin:0 0 24px;font-size:16px;opacity:.8}.card-button{display:inline-block;background-color:var(--secondary-color);color:var(--white);padding:8px 16px;border-radius:4px;text-decoration:none;font-weight:500;transition:background-color .3s}.card-button:hover{background-color:var(--primary-color)}@media(max-width:768px){.material-links-grid{grid-template-columns:1fr}.material-card{padding:20px}}.disclosure-page .material-card .card-content{padding:0}.disclosure-page .card-content ul li{margin-bottom:1em}</style>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
